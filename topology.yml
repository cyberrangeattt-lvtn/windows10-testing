name: windows-10-testing-topology

hosts:
  - name: win10
    base_box:
      image: OPNsense
      mgmt_user: freebsd
    flavor: standard.win10

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

networks:
  - name: switch
    cidr: 10.15.0.0/24

net_mappings:
    - host: win10
      network: switch
      ip: 10.15.0.10

router_mappings:
    - router: router
      network: switch
      ip: 10.15.0.1

groups: []
